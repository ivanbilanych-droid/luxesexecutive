<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>CSV to cars.js</title><style>body{font-family:Arial;padding:30px;background:#f6f3ec}textarea{width:100%;height:260px}button{padding:14px 24px;margin:15px 0;border-radius:999px;background:#050505;color:#fff;font-weight:700;border:0}pre{background:#fff;padding:18px;border:1px solid #ddd;border-radius:10px;white-space:pre-wrap}</style></head><body><h1>CSV → cars.js</h1><p>Вставь содержимое cars.csv, нажми кнопку, скопируй результат и замени файл <b>cars.js</b>.</p><textarea id="input"></textarea><br><button onclick="convert()">Сделать cars.js</button><pre id="output"></pre><script>
function parseCSV(text){const rows=[];let row=[],field='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='\"'&&q&&n=='\"'){field+='\"';i++;}else if(c=='\"')q=!q;else if((c==';'||c==',')&&!q){row.push(field.trim());field='';}else if((c=='\n'||c=='\r')&&!q){if(field||row.length){row.push(field.trim());rows.push(row);row=[];field='';}if(c=='\r'&&n=='\n')i++;}else field+=c;}if(field||row.length){row.push(field.trim());rows.push(row);}return rows.filter(r=>r.some(v=>String(v||'').trim()!==''));}
function convert(){const rows=parseCSV(document.getElementById('input').value);const hi=rows.findIndex(r=>{const n=r.map(x=>String(x||'').trim().toLowerCase());return n.includes('фото')&&n.includes('марка')&&n.includes('модель');});if(hi<0){alert('Не нашёл строку заголовков Фото / Марка / Модель');return;}const h=rows[hi];const data=rows.slice(hi+1).map(r=>Object.fromEntries(h.map((x,i)=>[x,r[i]||'']))).filter(c=>c['Фото']||c['Марка']||c['Модель']);document.getElementById('output').textContent='window.CARS_DATA = '+JSON.stringify(data,null,2)+';';}
</script></body></html>
