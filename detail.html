<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Detail vozidla | LUXES EXECUTIVE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; padding: 50px 0; }
    .gallery-box { width: 100%; }
    .view-main { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); height: 400px; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
    .view-main img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .thumbs-grid { display: flex; gap: 10px; margin-top: 14px; overflow-x: auto; }
    .thumbs-grid img { width: 85px; height: 60px; object-fit: cover; border: 1px solid var(--line); border-radius: 4px; cursor: pointer; background: var(--bg-card); padding: 2px; }
    .thumbs-grid img:hover, .thumbs-grid img.active { border-color: var(--gold); }
    
    .info-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); padding: 30px; }
    .info-card h1 { font-family: "Georgia", serif; font-size: 36px; margin: 0 0 6px 0; font-weight: 500; color: #fff; }
    .sub-title { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; }
    .price-box { background: rgba(255,255,255,0.02); border: 1px solid var(--line); padding: 16px 20px; border-radius: 6px; margin-bottom: 24px; }
    .price-box small { color: var(--text-muted); font-size: 12px; display: block; }
    .price-box strong { font-size: 28px; color: var(--gold); display: block; margin-top: 2px; }
    
    .data-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    .data-table td { padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; color: var(--text-muted); }
    .data-table td:last-child { text-align: right; font-weight: 700; color: #fff; }
    
    .action-links { display: flex; flex-direction: column; gap: 10px; }
    .btn-order-wa { background: #25D366; color: #fff; text-align: center; padding: 14px; border-radius: 4px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: block; }
    .btn-order-call { background: var(--gold); color: #000; text-align: center; padding: 14px; border-radius: 4px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: block; }
    .btn-order-wa:hover, .btn-order-call:hover { opacity: 0.9; }
    
    @media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; gap: 24px; } .view-main { height: 260px; } }
  </style>
</head>
<body>
  <div class="page">
    
    <header class="header">
      <div class="container">
        <a class="brand" href="index.html">
          <img src="assets/logo.png" alt="LE">
          <div class="brand-copy"><strong>LUXES</strong><span>EXECUTIVE</span></div>
        </a>
        <nav class="nav">
          <a href="index.html">Domů</a>
          <a class="active" href="catalog.html">Katalog</a>
          <a href="index.html#how">Jak pracujeme</a>
          <a href="index.html#about">O nás</a>
          <a href="index.html#services">Služby</a>
          <a href="#contact">Kontakty</a>
        </nav>
        <div class="tools">
          <div class="lang">
            <a href="index.html">CZ</a> · <a href="index_en.html">EN</a> · <a href="index_de.html">DE</a> · <a href="index_ru.html">RU</a>
          </div>
          <a class="icon-link" href="tel:+420777399799">☎</a>
          <a class="icon-link" href="https://wa.me/420777399799">◉</a>
          <a class="contact-btn" href="index.html#how">Kontaktovat</a>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="detail-layout" id="detailLayout">
          <!-- Obsah se vygeneruje automaticky pomocí JavaScriptu níže -->
        </div>
      </div>
    </main>

    <footer class="footer" id="contact">
      <div class="container">
        <div class="footer-grid">
          <div>
            <h3 style="font-family: Georgia, serif; letter-spacing: 2px; margin-top: 0;">LUXES EXECUTIVE</h3>
            <p>Prémiové vozy z Evropy</p>
          </div>
          <div>
            <h3>Kontakty</h3>
            <p>+420 777 399 799<br>executive@luxes.cz</p>
          </div>
          <div>
            <h3>WhatsApp</h3>
            <p><a href="https://wa.me/420777399799" style="color: var(--gold); font-weight: 700;">Write to us</a></p>
          </div>
          <div>
            <h3>Praha</h3>
            <p>Česká republika<br>Europe</p>
          </div>
        </div>
        <div class="copyright" style="text-align: center; margin-top: 40px; color: var(--text-muted); font-size: 12px;">© 2026 LUXES EXECUTIVE s.r.o.</div>
      </div>
    </footer>

  </div>

  <script src="cars.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const carId = params.get('id');
      const layout = document.getElementById('detailLayout');

      if (!window.CARS || !layout) return;

      // Najít auto podle ID z URL adresy
      const car = window.CARS.find(c => c.id === carId);

      if (!car) {
        layout.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px 0;"><h2>Vozidlo nebylo nalezeno</h2><a href="catalog.html" class="contact-btn" style="display: inline-block; margin-top: 20px;">Zpět do katalogu</a></div>`;
        return;
      }

      // Vygenerovat náhledy pro galerii
      const thumbsHtml = car.gallery.map((img, idx) => `
        <img src="${img}" alt="Náhled ${idx + 1}" class="${idx === 0 ? 'active' : ''}" onclick="document.getElementById('mainImg').src='${img}'; document.querySelectorAll('.thumbs-grid img').forEach(i => i.classList.remove('active')); this.classList.add('active');">
      `).join('');

      layout.innerHTML = `
        <!-- Levá strana: Galerie -->
        <div class="gallery-box">
          <div class="view-main">
            <img id="mainImg" src="${car.mainPhoto}" alt="${car.brand} ${car.model}">
          </div>
          <div class="thumbs-grid">
            ${thumbsHtml}
          </div>
        </div>

        <!-- Pravá strana: Informace -->
        <div class="info-card">
          <h1>${car.brand} ${car.model}</h1>
          <div class="sub-title">${car.trim} | ${car.engine} | ${car.gearbox}</div>

          <div class="price-box">
            <small>Cena vozidla</small>
            <strong>${car.price.toLocaleString('cs-CZ')} €</strong>
          </div>

          <table class="data-table">
            <tr><td>Rok výroby</td><td>${car.year}</td></tr>
            <tr><td>Najeto</td><td>${car.mileage.toLocaleString('cs-CZ')} km</td></tr>
            <tr><td>Palivo</td><td>${car.fuel}</td></tr>
            <tr><td>Převodovka</td><td>${car.gearbox}</td></tr>
            <tr><td>Barva</td><td>${car.color}</td></tr>
            <tr><td>Status</td><td>${car.status}</td></tr>
          </table>

          <div class="action-links">
            <a href="https://wa.me/420777399799?text=Dobrý den, mám zájem o vůz ${car.brand} ${car.model}" class="btn-order-wa" target="_blank">Mám zájem přes WhatsApp</a>
            <a href="tel:+420777399799" class="btn-order-call">Zavolat prodejci</a>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
