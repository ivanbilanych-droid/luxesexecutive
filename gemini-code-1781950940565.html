<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LUXES EXECUTIVE</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #050505; color: #fff; font-family: Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    :root { --g: #d9a441; --g2: #f4cc77; --m: #cfcfcf; --l: rgba(217,164,65,.35); }
    
    /* Шапка сайта */
    .header { position: sticky; top: 0; background: #050505eF; z-index: 10; border-bottom: 1px solid var(--l); }
    .top { max-width: 1680px; margin: auto; padding: 14px 46px; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
    
    /* Логотип в шапке */
    .logo { display: flex; align-items: center; justify-content: flex-start; }
    .logo img { height: 50px; width: auto; object-fit: contain; display: block; }
    
    .contacts { display: flex; gap: 18px; align-items: center; font-weight: 900; }
    .wa { background: linear-gradient(135deg,#f4cc77,#d49b38); color: #050505; padding: 14px 24px; border-radius: 6px; }
    .lang { border: 1px solid var(--l); padding: 12px 14px; border-radius: 6px; white-space: nowrap; }
    
    .nav { border-top: 1px solid rgba(217,164,65,.18); }
    .nav div { max-width: 1680px; margin: auto; padding: 0 46px; height: 52px; display: flex; align-items: center; gap: 60px; font-weight: 900; text-transform: uppercase; font-size: 14px; }
    
    /* Главный баннер — ИСПРАВЛЕНО: делаем картинку на фоне меньше и двигаем в угол */
    .hero { position: relative; min-height: 650px; overflow: hidden; background: #050505; border-bottom: 1px solid var(--l); }
    .hero:before { 
      content: ""; 
      position: absolute; 
      inset: 0; 
      /* Плотный черный градиент слева, чтобы текст горел, а картинка плавно выходила справа */
      background: linear-gradient(90deg, #050505 0%, #050505 35%, rgba(5,5,5,0.7) 60%, rgba(5,5,5,0) 100%), 
                  url('hero-g63-prague.jpg') right bottom no-repeat; 
      /* ИСПРАВЛЕНО: уменьшили картинку до 1100px, чтобы Гелик и надпись гарантированно поместились целиком */
      background-size: 1100px auto; 
      opacity: .75; 
      z-index: 1; 
    }
    .hero .in { position: relative; z-index: 2; max-width: 1680px; margin: auto; padding: 90px 46px; display: flex; justify-content: space-between; align-items: center; gap: 40px; }
    
    .hero h1 { font-family: Georgia, serif; font-size: 64px; text-transform: uppercase; margin: 0 0 24px; line-height: 1.1; font-weight: 900; letter-spacing: 1px; }
    .hero h1 span { color: var(--g2); }
    .hero p { max-width: 640px; color: var(--m); font-size: 18px; line-height: 1.6; margin: 0 0 40px; }
    
    .tags { display: flex; gap: 18px; flex-wrap: wrap; }
    .tags span { border: 1px solid var(--l); padding: 14px 20px; border-radius: 6px; font-weight: 900; font-size: 15px; background: rgba(5,5,5,.4); backdrop-filter: blur(6px); }
    .tags i { color: var(--g); font-style: normal; margin-right: 8px; }
    
    .hero .btn { background: linear-gradient(135deg,#f4cc77,#d49b38); color: #050505; font-weight: 900; padding: 20px 40px; border-radius: 6px; display: inline-block; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Каталог */
    .catalog { max-width: 1680px; margin: auto; padding: 80px 46px; }
    .catalog h2 { font-family: Georgia, serif; font-size: 42px; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 1px; }
    .catalog .sub { color: var(--m); font-size: 18px; margin-bottom: 46px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(420px,1fr)); gap: 32px; }
    .card { background: #111; border: 1px solid rgba(217,164,65,.18); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .photo { height: 280px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #444; font-weight: 900; font-size: 20px; }
    .cb { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .ct { font-family: Georgia, serif; font-size: 24px; margin-bottom: 18px; font-weight: 900; }
    .cl { color: var(--m); font-size: 15px; margin-bottom: 6px; }
    .cl span { color: #666; margin: 0 8px; }
    .cl.cs { margin-bottom: 24px; color: #888; }
    .price { font-size: 18px; font-weight: 900; color: var(--g2); margin-top: auto; letter-spacing: 1px; }
    
    /* Как мы работаем */
    .work { background: #111; border-top: 1px solid var(--l); border-bottom: 1px solid var(--l); }
    .wg { max-width: 1680px; margin: auto; padding: 80px 46px; display: flex; justify-content: space-between; gap: 46px; }
    .work h2 { font-family: Georgia, serif; font-size: 42px; margin: 0 0 24px; text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { color: var(--m); font-size: 20px; line-height: 1.8; font-weight: 900; }
    
    .box { background: #050505; border: 1px solid var(--l); padding: 40px; border-radius: 12px; width: 100%; max-width: 540px; }
    .fg { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
    .fg input, .fg textarea { background: #111; border: 1px solid rgba(217,164,65,.25); padding: 14px; color: #fff; font-family: inherit; font-size: 15px; border-radius: 6px; }
    .fg input:focus, .fg textarea:focus { outline: none; border-color: var(--g); }
    .fg textarea { height: 100px; resize: none; }
    .box button { background: linear-gradient(135deg,#f4cc77,#d49b38); color: #050505; border: none; padding: 16px; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; border-radius: 6px; width: 100%; cursor: pointer; }
    aside.box { max-width: 400px; }
    
    /* Подвал */
    .footer { background: #020202; border-top: 1px solid rgba(217,164,65,.1); }
    .fin { max-width: 1680px; margin: auto; padding: 60px 46px; display: flex; justify-content: space-between; gap: 40px; }
    .footer h3 { font-family: Georgia, serif; font-size: 26px; color: var(--g2); margin: 0 0 12px; }
    .footer p { color: #666; font-size: 14px; max-width: 400px; line-height: 1.5; }
    .footer h4 { color: var(--g); text-transform: uppercase; font-size: 13px; letter-spacing: 2px; margin: 0 0 16px; font-weight: 900; }

    /* Мобильный адаптив */
    @media (max-width: 768px) {
      .top { padding: 14px 15px; flex-direction: column; gap: 14px; text-align: center; }
      .logo { justify-content: center; width: 100%; }
      .logo img { height: 38px; margin: auto; } 
      .contacts { width: 100%; justify-content: center; gap: 10px; }
      .wa, .lang { padding: 10px 16px; font-size: 13px; }
      .nav div { padding: 0 15px; height: auto; padding-top: 12px; padding-bottom: 12px; flex-wrap: wrap; gap: 15px; justify-content: center; font-size: 12px; }
      .hero .in { padding: 50px 15px; flex-direction: column; text-align: center; }
      .hero:before { background-size: cover; background-position: center; opacity: 0.25; } 
      .hero h1 { font-size: 34px; }
      .hero p { font-size: 15px; }
